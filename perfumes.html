<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Limited Edition Perfume</title>

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #EEFF00;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  font-family: 'Open Sans', sans-serif;
}

.page {
  padding: 14px;
  max-width: 420px;
  margin: 0 auto;
}

.header {
  margin-bottom: 20px;
}

.intro-title {
  margin: 0 0 6px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.product-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.product {
  position: relative;
  cursor: pointer;
}

.product-image {
  width: 60%;
  height: auto;
  display: block;
  border: 6px solid white;
}

.product-title {
  position: absolute;
  bottom: 8px;
  left: 8px;
  right: 40%;
  color: white;
  font-size: 13px;
  font-weight: 700;
  text-shadow: 0 0 6px rgba(0,0,0,0.6);
}

.footer {
  margin-top: 28px;
  padding-top: 14px;
  border-top: 1px solid rgba(0,0,0,0.15);
}

.intro-text {
  margin: 0 0 10px;
  font-size: 12px;
  line-height: 1.5;
}

.contact-buttons {
  display: flex;
  gap: 6px;
}

.nav-link {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #000;
  text-decoration: none;
  border: 1px solid #000;
  padding: 3px 6px;
}

.modal {
  position: fixed;
  inset: 0;
  background: #EEFF00;
  display: none;
  z-index: 10;
  overflow-y: auto;
}

.modal.active { display: block; }

.close {
  position: fixed;
  top: 10px;
  right: 14px;
  font-size: 20px;
  cursor: pointer;
}

.modal-content {
  padding: 18px;
  max-width: 420px;
  margin: 0 auto;
}

.modal img {
  width: 100%;
  border: 6px solid white;
  margin-bottom: 18px;
}

.modal-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 12px;
}

.modal-text {
  font-size: 14px;
  line-height: 1.6;
  margin-bottom: 18px;
  max-width: 36ch;
}

.modal-meta-sub {
  font-size: 12px;
  opacity: 0.8;
}
</style>
</head>

<body>

<main class="page">

  <header class="header">
    <h1 class="intro-title">Limited Edition Perfumes</h1>
  </header>

  <section class="product-list">

    <div class="product" onclick="openModal(0)">
      <img src="perfume-1.JPG" class="product-image">
      <div class="product-title">Calcined Bone Dust</div>
    </div>

    <div class="product" onclick="openModal(1)">
      <img src="perfume-2.JPG" class="product-image">
      <div class="product-title">Marrow Residue</div>
    </div>

    <div class="product" onclick="openModal(2)">
      <img src="perfume-3.JPG" class="product-image">
      <div class="product-title">Ossified Oil</div>
    </div>

    <div class="product" onclick="openModal(3)">
      <img src="perfume-4.JPG" class="product-image">
      <div class="product-title">Ash of Structure</div>
    </div>

  </section>

  <footer class="footer">
    <p class="intro-text">
      For acquisition inquiries:
    </p>
    <div class="contact-buttons">
      <a href="mailto:hamid.m.shams@gmail.com" class="nav-link">Email</a>
      <a href="https://www.instagram.com/__hamidshams__/" class="nav-link" target="_blank">Instagram</a>
    </div>
  </footer>

</main>

<div class="modal" id="modal">
  <div class="close" onclick="closeModal()">✕</div>
  <div class="modal-content" id="modalContent"></div>
</div>

<script>

const data = [
{
title: "Calcined Bone Dust",
img: "perfume-1.JPG",
text: "Bone reduced to a pale mineral powder through heat. Dry, almost scentless, but it holds a faint trace of something that once was organic—like memory turned into matter."
},
{
title: "Marrow Residue",
img: "perfume-2.JPG",
text: "Not the marrow itself, but what remains after extraction. A dense, almost invisible base—warm, heavy, and difficult to locate."
},
{
title: "Ossified Oil",
img: "perfume-3.JPG",
text: "An imagined oil derived from bone structure. Thick, slow, slightly metallic—between mineral and body."
},
{
title: "Ash of Structure",
img: "perfume-4.JPG",
text: "What is left after the last form collapses. Light, airborne, almost absent yet persistent."
}
];

function openModal(i){
  const item = data[i];
  const modal = document.getElementById("modal");
  const content = document.getElementById("modalContent");

  content.innerHTML = `
    <img src="${item.img}">
    <div class="modal-title">${item.title}</div>
    <div class="modal-text">${item.text}</div>
    <div class="modal-meta-sub">Pinhole photography, c-print, 10×15 cm, 2025</div>
  `;

  modal.classList.add("active");
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

</script>

</body>
</html>
