<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />
  <title>Limited Edition Perfume</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f6f3;
      color: #1f1f1f;
      min-height: 100vh;
    }

    .page {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .product-image {
      width: 100%;
      display: block;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      background: #eee;
    }

    .content {
      padding: 20px;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8a7e74;
      margin: 0 0 8px 0;
    }

    h1 {
      font-size: 28px;
      line-height: 1.15;
      margin: 0 0 12px 0;
    }

    .description {
      font-size: 15px;
      line-height: 1.5;
      color: #555;
      margin-bottom: 18px;
    }

    .price {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 18px;
    }

    .quantity-block {
      margin-bottom: 20px;
    }

    .quantity-block label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: #444;
    }

    .quantity-input {
      width: 100%;
      height: 52px;
      font-size: 18px;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 0 14px;
      background: #fff;
    }

    .note {
      font-size: 13px;
      color: #777;
      margin-top: 12px;
      line-height: 1.4;
    }

    .paypal-wrap {
      margin-top: 18px;
    }

    .fake-button-preview {
      display: block;
      width: 100%;
      height: 54px;
      border: none;
      border-radius: 14px;
      background: #111;
      color: white;
      font-size: 17px;
      font-weight: 600;
      text-align: center;
      line-height: 54px;
      text-decoration: none;
    }

    .footer-space {
      height: 20px;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <img
        src="perfume.jpg"
        alt="Limited Edition Perfume"
        class="product-image"
      />

      <div class="content">
        <p class="eyebrow">Exclusive Drop</p>
        <h1>Limited Edition Perfume</h1>

        <p class="description">
          A limited edition perfume available in very small quantities.
        </p>

        <div class="price">€89.00</div>

        <div class="quantity-block">
          <label for="quantity">Quantity</label>
          <input
            id="quantity"
            class="quantity-input"
            type="number"
            min="1"
            value="1"
          />
        </div>

        <!--
          OPTION A: paste your PayPal button code here.
          This is the recommended option.
        -->
        <div class="paypal-wrap" id="paypal-button-area">
          <!-- PASTE PAYPAL BUTTON CODE BELOW THIS LINE -->

          <!-- Example placeholder -->
          <a href="#" class="fake-button-preview">Purchase with PayPal</a>

          <!-- PASTE PAYPAL BUTTON CODE ABOVE THIS LINE -->
        </div>

        <p class="note">
          Secure checkout handled by PayPal.
        </p>
      </div>
    </section>

    <div class="footer-space"></div>
  </main>
</body>
</html>
