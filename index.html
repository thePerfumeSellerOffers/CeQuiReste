<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Limited Edition Perfume</title>

  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #EEFF00;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: var(--bg);
      font-family: 'Open Sans', sans-serif;
      color: #000;
    }

    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 14px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .header-left {
      max-width: 60%;
    }

    .intro-title {
      margin: 0 0 6px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      line-height: 1.2;
    }

    .intro-text {
      margin: 0;
      font-size: 12px;
      line-height: 1.5;
    }

    .contact-buttons {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .nav-link {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #000;
      text-decoration: none;
      border: 1px solid #000;
      padding: 3px 5px;
    }

    .logo {
      width: 120px;
      height: auto;
      flex-shrink: 0;
    }

    .scroll-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      gap: 14px;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      align-items: stretch;
      padding-bottom: 2px;
    }

    .scroll-wrap::-webkit-scrollbar {
      height: 6px;
    }

    .scroll-wrap::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.35);
    }

    .product {
      position: relative;
      flex: 0 0 75%;
      max-width: 75%;
      height: 100%;
      min-height: 100%;
      scroll-snap-align: start;
      cursor: pointer;
    }

    .product-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border: 6px solid white;
      display: block;
    }

    .product-title {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      color: white;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
      text-shadow: 0 0 6px rgba(0, 0, 0, 0.6);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: #EEFF00;
      display: none;
      z-index: 10;
      overflow-y: auto;
    }

    .modal.active {
      display: block;
    }

    .close {
      position: fixed;
      top: 10px;
      right: 14px;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      z-index: 11;
    }

    .modal-content {
      padding: 18px 18px 28px;
      max-width: 420px;
      margin: 0 auto;
    }

    .modal img {
      width: 100%;
      border: 6px solid white;
      margin-bottom: 18px;
      display: block;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .modal-text {
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 20px;
      max-width: 36ch;
    }

    .modal-meta-group {
      margin-top: 16px;
      max-width: 36ch;
    }

    .modal-meta-main {
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .modal-meta-sub {
      font-size: 12px;
      line-height: 1.5;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <div class="header-left">
        <h1 class="intro-title">Limited Edition Perfumes</h1>
        <p class="intro-text">
          Each perfume is sold with an accompanying image print.<br>
          For acquisition inquiries:
        </p>

        <div class="contact-buttons">
          <a href="mailto:hamid.m.shams@gmail.com" class="nav-link">Email</a>
          <a href="https://www.instagram.com/__hamidshams__/" class="nav-link" target="_blank" rel="noopener noreferrer">Instagram</a>
        </div>
      </div>

      <img src="logo.png" alt="Logo" class="logo">
    </header>

    <section class="scroll-wrap">
      <div class="product" onclick="openModal(0)">
        <img src="perfume-1.JPG" alt="Calcined Bone Dust" class="product-image">
        <div class="product-title">Calcined Bone Dust</div>
      </div>

      <div class="product" onclick="openModal(1)">
        <img src="perfume-2.JPG" alt="Marrow Residue" class="product-image">
        <div class="product-title">Marrow Residue</div>
      </div>

      <div class="product" onclick="openModal(2)">
        <img src="perfume-3.JPG" alt="Ossified Oil" class="product-image">
        <div class="product-title">Ossified Oil</div>
      </div>

      <div class="product" onclick="openModal(3)">
        <img src="perfume-4.JPG" alt="Ash of Structure" class="product-image">
        <div class="product-title">Ash of Structure</div>
      </div>
    </section>
  </main>

  <div class="modal" id="modal">
    <div class="close" onclick="closeModal()">✕</div>
    <div class="modal-content" id="modalContent"></div>
  </div>

  <script>
    const data = [
      {
        title: "Calcined Bone Dust",
        img: "perfume-1.JPG",
        text: "Bone reduced to a pale mineral powder through heat. Dry, almost scentless, but it holds a faint trace of something that once was organic—like memory turned into matter."
      },
      {
        title: "Marrow Residue",
        img: "perfume-2.JPG",
        text: "Not the marrow itself, but what remains after extraction. A dense, almost invisible base—warm, heavy, and difficult to locate."
      },
      {
        title: "Ossified Oil",
        img: "perfume-3.JPG",
        text: "An imagined oil derived from bone structure. Thick, slow, slightly metallic—between mineral and body."
      },
      {
        title: "Ash of Structure",
        img: "perfume-4.JPG",
        text: "What is left after the last form collapses. Light, airborne, almost absent yet persistent."
      }
    ];

    function openModal(i) {
      const item = data[i];
      const modal = document.getElementById("modal");
      const content = document.getElementById("modalContent");

      content.innerHTML = `
        <img src="${item.img}" alt="${item.title}">
        <div class="modal-title">${item.title}</div>
        <div class="modal-text">${item.text}</div>
        <div class="modal-meta-group">
          <div class="modal-meta-main">Each perfume is sold with an accompanying image print.</div>
          <div class="modal-meta-sub">Pinhole photography, c-print, 10×15 cm, 2025</div>
        </div>
      `;

      modal.classList.add("active");
    }

    function closeModal() {
      document.getElementById("modal").classList.remove("active");
    }
  </script>
</body>
</html>
