<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1"
  />
  <!-- <title>The Perfume Seller</title> -->

  <!-- Open Sans font -->
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #EEFF00;
      font-family: 'Open Sans', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #000;
      text-align: center;
    }

    .container {
      max-width: 420px;
      padding: 24px;
    }

    .image {
      width: 200px;
      height: 200px;
      object-fit: cover;
      margin: 0 auto 28px auto;
      display: block;
      border-radius: 0; /* sharper feel */
    }

    .poem {
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 40px;
      white-space: pre-line;
      font-weight: 300;
    }

    /* Disabled button style */
    .disabled-button {
      display: inline-block;
      padding: 14px 20px;
      border-radius: 10px;
      border: 1px solid #000;
      font-size: 14px;
      color: #000;
      background: transparent;
      opacity: 0.5;
      cursor: not-allowed;
      user-select: none;
    }
  </style>
</head>

<body>
  <main class="container">
    
    <img src="perfume.jpg" alt="Perfume" class="image" />

    <div class="poem">
the perfume seller offers  
ce qui reste  

a trace of something  
that no longer belongs to anyone
    </div>

    <div class="disabled-button">
      Sales start on April 10th
    </div>

  </main>
</body>
</html>
